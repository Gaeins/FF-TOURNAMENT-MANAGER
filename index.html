<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tournament Manager · Free Fire</title>
<meta name="description" content="Tournois Free Fire organisés par GΛΞINS_404 · CS Headshot Squad">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="shared.js"></script>
</head>
<body>

<button id="mute-btn" onclick="toggleMuteBtn()" title="Couper/activer la musique" style="position:fixed;bottom:68px;right:20px;width:42px;height:42px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);font-size:18px;cursor:pointer;z-index:9998;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:.2s">🔊</button>
<button id="darkmode-btn" onclick="setDarkMode(!getDarkMode())" title="Changer le thème">☀️</button>

<div class="wrap">

  <div class="home-hero">
    <div style="font-size:8px;letter-spacing:2px;color:#ff7744;font-family:'Orbitron',sans-serif;margin-bottom:8px;position:relative;z-index:1">
      PLATEFORME OFFICIELLE · FREE FIRE
    </div>
    <div class="home-hero-title" style="position:relative;z-index:1">TOURNAMENT <span>MANAGER</span></div>
    <div class="home-hero-sub" style="position:relative;z-index:1;margin-top:8px">
      SÉLECTIONNE UN TOURNOI · INSCRIS-TOI · JOUE
    </div>
    <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:14px 0 0;position:relative;z-index:1">
      <button class="btn-contact contact" id="btn-contact" onclick="copyContact()">📋 <span class="nav-text">NOUS CONTACTER</span></button>
      <button class="btn-contact join"    id="btn-join"    onclick="goJoin()">🎮 <span class="nav-text">NOUS REJOINDRE</span></button>
    </div>
  </div>

  <nav class="nav">
    <a href="index.html"         class="nav-link active"><span class="ico">🏠</span><span class="nav-text"> ACCUEIL</span></a>
    <a href="joueurs.html"       class="nav-link"><span class="ico">👥</span><span class="nav-text"> JOUEURS</span></a>
    <a href="matchs.html"        class="nav-link"><span class="ico">🏆</span><span class="nav-text"> MATCHS</span></a>
    <a href="espace-joueur.html" class="nav-link"><span class="ico">🎮</span><span class="nav-text"> MON ESPACE</span></a>
    <a href="admin.html"         class="nav-link"><span class="ico">⚙️</span><span class="nav-text"> ADMIN</span> <span class="lock">🔒</span></a>
  </nav>

  <!-- ANNONCES ADMIN (affichées si actives) -->
  <div id="announcements-wrap"></div>

  <div class="panel">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div style="font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;color:var(--text3)">TOURNOIS DISPONIBLES</div>
      <span id="t-count-badge" style="background:rgba(255,68,0,0.12);color:#ff7744;font-size:9px;padding:4px 10px;border-radius:4px;font-family:'Orbitron',sans-serif;letter-spacing:1px">0 TOURNOI</span>
    </div>

    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">
      <button class="ts-tab active" onclick="setFilter('all',this)">TOUS</button>
      <button class="ts-tab" onclick="setFilter('upcoming',this)">⏳ À VENIR</button>
      <button class="ts-tab" onclick="setFilter('ongoing',this)">🔴 EN COURS</button>
      <button class="ts-tab" onclick="setFilter('ended',this)">✓ TERMINÉS</button>
    </div>

    <div class="tournament-grid" id="tournament-grid">
      <div class="empty" style="grid-column:1/-1">CHARGEMENT…</div>
    </div>

  </div>
</div>

<script>
// Sync Firebase au démarrage (données fraîches depuis le cloud)
migrateIfNeeded();
dbSync().then(() => {
  migrateIfNeeded(); // re-migrer après sync Firebase
  if(typeof renderTournaments === 'function') renderTournaments();
  if(typeof render === 'function') render();
});
initDarkMode();
// Temps réel : mise à jour automatique si l'admin modifie un tournoi
startRealtimeSync(() => {
  if(typeof renderTournaments === 'function') renderTournaments();
  if(typeof render === 'function') render();
  if(typeof renderMatches === 'function') renderMatches();
});
let _filter = 'all';

// ── CONTACT & REJOINDRE ───────────────────────────────────────────
function getContactTournament() {
  const list = getTournaments();
  if (!list.length) return null;
  return list.find(t => getTournamentStatus(t) === 'ongoing')
      || list.find(t => getTournamentStatus(t) === 'upcoming')
      || list[0];
}
function copyContact() {
  const t = getContactTournament();
  const coords = [];
  if (t && t.contactPhone) coords.push('📞 ' + t.contactPhone);
  if (t && t.contactEmail) coords.push('📧 ' + t.contactEmail);
  if (!coords.length) { notify('⚠ Aucune coordonnée configurée par l\'admin', 'err'); return; }
  navigator.clipboard.writeText(coords.join('\n')).then(() => {
    notify('✓ Coordonnées copiées !', 'ok');
    const btn = document.getElementById('btn-contact');
    const orig = btn.innerHTML;
    btn.innerHTML = '✅ COPIÉ !';
    setTimeout(() => { btn.innerHTML = orig; }, 2500);
  }).catch(() => notify('⚠ Impossible de copier', 'err'));
}
function goJoin() {
  const t = getContactTournament();
  if (!t || !t.joinLink) { notify('⚠ Lien non configuré par l\'admin', 'err'); return; }
  window.open(t.joinLink, '_blank');
}

// ── FILTRE ────────────────────────────────────────────────────────
function setFilter(f, el) {
  _filter = f;
  document.querySelectorAll('.ts-tab').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  renderTournaments();
}

// ── RENDER ────────────────────────────────────────────────────────
function renderTournaments() {
  const all   = getTournaments();
  const grid  = document.getElementById('tournament-grid');
  const badge = document.getElementById('t-count-badge');

  // Recalcul statuts auto (sauf 'ended' forcé manuellement)
  all.forEach(t => {
    if (t.status !== 'ended') {
      const c = getTournamentStatus(t);
      if (c !== t.status) { t.status = c; saveTournament(t); }
    }
  });

  const list = _filter === 'all' ? all : all.filter(t => getTournamentStatus(t) === _filter);
  badge.textContent = all.length + ' TOURNOI' + (all.length > 1 ? 'S' : '');

  // ── État vide : pas de tournois créés ─────────────────────────
  if (!all.length) {
    grid.innerHTML = `
    <div class="empty" style="grid-column:1/-1">
      <div style="font-size:28px;margin-bottom:12px">🏆</div>
      AUCUN TOURNOI CRÉÉ<br>
      <span style="font-size:9px;opacity:.7">L'administrateur créera les tournois depuis le panneau Admin</span><br><br>
      <a href="admin.html" class="btn-secondary" style="display:inline-block;text-decoration:none">⚙️ Panneau Admin</a>
    </div>`;
    return;
  }

  if (!list.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">AUCUN TOURNOI DANS CETTE CATÉGORIE</div>`;
    return;
  }

  const order = {ongoing:0, upcoming:1, ended:2};
  list.sort((a,b) => (order[getTournamentStatus(a)]||1) - (order[getTournamentStatus(b)]||1));
  grid.innerHTML = list.map(buildCard).join('');
}

function buildCard(t) {
  const status = getTournamentStatus(t);
  const sl     = getStatusLabel(status);
  const data   = getData(t.id);
  const nbOk   = (data.approved||[]).length;
  const isPaid = t.type === 'paid';
  const isFull = nbOk >= t.maxTeams;

  const parts   = t.name.trim().split(' ');
  const nameHtml = parts.length >= 2
    ? parts[0] + ' <span>' + parts.slice(1).join(' ') + '</span>'
    : '<span>' + t.name + '</span>';

  const dateStr = t.date
    ? new Date(t.date).toLocaleDateString('fr-FR', {day:'2-digit',month:'short',year:'numeric'})
    : 'Date TBD';

  const statusBadge = status === 'ongoing'
    ? `<span class="badge badge-ongoing"><span class="live-dot" style="margin-right:4px;vertical-align:middle"></span>${sl.label}</span>`
    : `<span class="badge badge-${status}">${sl.icon} ${sl.label}</span>`;

  const placesLeft  = t.maxTeams - nbOk;
  const placesColor = isFull ? 'var(--red-soft)' : placesLeft <= 3 ? 'var(--yellow)' : 'var(--green)';

  return `
  <div class="tournament-card${status==='ended'?' ended':''}" onclick="openTournament('${t.id}')">
    <div class="tc-head">
      <div class="tc-name">${nameHtml}</div>
      <div class="tc-badges">
        ${statusBadge}
        <span class="badge badge-${isPaid?'paid':'free'}">${isPaid?'💰':'🎮'}</span>
      </div>
    </div>
    <div class="tc-sub">${t.sub}</div>
    <div class="tc-info">
      <div>📅 <strong>${dateStr}</strong></div>
      <div>📍 <strong>${t.lieu||'—'}</strong></div>
      <div>⚔️ <strong>${t.format||'—'}</strong></div>
      <div>👥 <strong style="color:${placesColor}">${isFull?'🔴 COMPLET':nbOk+'/'+t.maxTeams}</strong></div>
    </div>
    <div class="tc-prize">🏆 PRIZE POOL · ${t.pt||'—'}</div>
    <div style="display:flex;justify-content:flex-end">
      <span style="font-family:'Orbitron',sans-serif;font-size:8px;color:var(--red);letter-spacing:1px">
        ${status==='ended'?'RÉSULTATS →':isFull?"FILE D'ATTENTE →":"S'INSCRIRE →"}
      </span>
    </div>
  </div>`;
}

function openTournament(id) {
  setActiveTournamentId(id);
  window.location.href = 'inscription.html?t=' + id;
}

renderTournaments();
setInterval(renderTournaments, 30000);

// ── MUSIQUE GLOBALE ───────────────────────────────────────────────
resumeGlobalMusic();

// Initialiser le bouton mute
(function(){
  const btn = document.getElementById('mute-btn');
  if (btn) btn.textContent = getMuteState() ? '🔇' : '🔊';
})();

function toggleMuteBtn() {
  const muted = toggleMute();
  notify(muted ? '🔇 Musique coupée' : '🔊 Musique activée', 'info');
}

// ── ANNONCES PUBLIQUES ───────────────────────────────────────────
function renderAnnouncements() {
  const list = getAnnouncements().filter(a => a.active !== false);
  const wrap = document.getElementById('announcements-wrap');
  if (!wrap || !list.length) { if(wrap) wrap.innerHTML=''; return; }

  const typeStyle = {
    info:    { bg:'rgba(133,183,235,0.07)', border:'var(--blue-border)',   icon:'ℹ️', color:'var(--blue)'   },
    warning: { bg:'rgba(239,159,39,0.07)',  border:'rgba(239,159,39,0.2)', icon:'⚠️', color:'var(--yellow)' },
    poll:    { bg:'rgba(255,68,0,0.06)',    border:'var(--border2)',        icon:'📊', color:'var(--red)'    }
  };

  wrap.innerHTML = list.map(a => {
    const ts = typeStyle[a.type] || typeStyle.info;
    let body = `<div style="font-size:13px;color:var(--text2);line-height:1.6;margin-top:4px">${a.body||''}</div>`;

    if (a.type === 'poll' && a.options && a.options.length) {
      const voted    = hasVoted(a.id);
      const myVote   = getMyVote(a.id);
      const total    = Object.values(a.votes||{}).reduce((s,v)=>s+v,0);
      body += `<div style="margin-top:12px;display:grid;gap:8px">` +
        a.options.map((opt, i) => {
          const pct  = total ? Math.round(((a.votes||{})[i]||0)/total*100) : 0;
          const isMe = voted && myVote === i;
          return `<button onclick="castVote('${a.id}',${i})" ${voted?'disabled':''} style="
            position:relative;overflow:hidden;text-align:left;padding:10px 14px;
            border-radius:6px;cursor:${voted?'default':'pointer'};
            background:${isMe?'rgba(255,68,0,0.12)':'var(--card-bg)'};
            border:1px solid ${isMe?'var(--border2)':'var(--border)'};
            font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--text2);width:100%">
            ${voted?`<div style="position:absolute;left:0;top:0;bottom:0;width:${pct}%;background:rgba(255,68,0,0.08);transition:.5s"></div>`:''}
            <span style="position:relative;z-index:1">${opt}${voted?' — '+pct+'% ('+((a.votes||{})[i]||0)+' vote'+(((a.votes||{})[i]||0)>1?'s':'')+')'+(isMe?' ✓':''): ''}</span>
          </button>`;
        }).join('') + `</div>`;
      if (voted) body += `<div style="font-size:10px;color:var(--text3);font-family:'Orbitron',sans-serif;letter-spacing:1px;margin-top:6px">✓ Tu as voté · ${total} vote${total>1?'s':''} au total</div>`;
    }

    return `<div style="background:${ts.bg};border:1px solid ${ts.border};border-radius:10px;padding:14px 16px;margin:0 0 0">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:16px">${ts.icon}</span>
        <div style="font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1px;color:${ts.color}">${a.title}</div>
      </div>
      ${body}
    </div>`;
  }).join('');
}

function castVote(annId, optIdx) {
  if (!votePoll(annId, optIdx)) { notify('⚠ Tu as déjà voté', 'err'); return; }
  renderAnnouncements();
  notify('✓ Vote enregistré !', 'ok');
}

renderAnnouncements();
setInterval(renderAnnouncements, 10000);
</script>
</body>
</html>
